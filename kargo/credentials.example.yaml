# Kargo writes promotions back to Git (it commits the new `newTag:` and pushes),
# so it needs Git credentials with WRITE access to this repo. Copy this file,
# fill in a Personal Access Token (or a fine-grained token / GitHub App token),
# and apply it -- but DO NOT commit the filled-in version.
#
#   cp credentials.example.yaml credentials.yaml
#   # edit credentials.yaml ...
#   kubectl apply -f credentials.yaml
#
# The image at ghcr.io/gsaini/argocd-getting-started is public, so no registry
# read credentials are needed. If you make the package private, add a second
# Secret labelled `kargo.akuity.io/cred-type: image` with the same shape.
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: argocd-getting-started
  labels:
    kargo.akuity.io/cred-type: git
stringData:
  # Match by repo URL prefix -- this credential is used for any repo under it.
  repoURL: https://github.com/gsaini/argocd-getting-started.git
  username: gsaini
  password: REPLACE_WITH_GIT_PAT_WITH_REPO_WRITE
type: Opaque
