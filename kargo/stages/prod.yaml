apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: argocd-getting-started
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: web
      sources:
        # prod only accepts Freight that has already landed in staging.
        stages:
          - staging
  # prod has no auto-promotion (see ProjectConfig). A human releases by creating
  # a Promotion -- `kargo promote --project ... --stage prod --freight ...` or the
  # "Promote" button in the Kargo UI -- which then runs these same steps.
  promotionTemplate:
    spec:
      vars:
        - name: gitRepo
          value: https://github.com/gsaini/argocd-getting-started.git
        - name: imageRepo
          value: ghcr.io/gsaini/argocd-getting-started
        - name: overlay
          value: k8s/overlays/prod
        - name: argocdApp
          value: demo-prod
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitRepo }}
            checkout:
              - branch: main
                path: ./repo
        - uses: kustomize-set-image
          as: set-image
          config:
            path: ./repo/${{ vars.overlay }}
            images:
              - image: ${{ vars.imageRepo }} # tag auto-derived from Freight
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: "kargo: promote ${{ imageFrom(vars.imageRepo).Tag }} to prod"
        - uses: git-push
          config:
            path: ./repo
        # demo-prod is manual-sync in Argo CD; this step performs the release.
        - uses: argocd-update
          config:
            apps:
              - name: ${{ vars.argocdApp }}
                sources:
                  - repoURL: ${{ vars.gitRepo }}
                    desiredRevision: ${{ outputs.commit.commit }}
