apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argocd-getting-started
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Build-once / deploy-many demo across dev, staging and prod.
  sourceRepos:
    - https://github.com/gsaini/argocd-getting-started.git
  destinations:
    # The app-of-apps root creates child Application objects in the argocd ns.
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: argocd-demo-dev
    - server: https://kubernetes.default.svc
      namespace: argocd-demo-staging
    - server: https://kubernetes.default.svc
      namespace: argocd-demo-prod
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
