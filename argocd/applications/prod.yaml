apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-prod
  namespace: argocd
  annotations:
    # Authorise the Kargo `prod` Stage to sync this Application (manual release).
    kargo.akuity.io/authorized-stage: argocd-getting-started:prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: argocd-getting-started
  source:
    repoURL: https://github.com/gsaini/argocd-getting-started.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-demo-prod
  # Production is intentionally NOT auto-synced: the git change (promotion) is
  # the gate, and a human clicks "Sync" in the Argo CD UI / CLI to release.
  # Flip `automated` on if you want fully hands-off promotion.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
