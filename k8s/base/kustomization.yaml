apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Common, environment-agnostic definition of the app.
# Overlays patch replicas/resources, set the image tag, and supply env config.
resources:
  - deployment.yaml
  - service.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: argocd-getting-started

# Base configuration. Overlays override these values with a merge patch
# (configMapGenerator with behavior: merge), and the content hash suffix makes
# config changes roll the Deployment automatically.
configMapGenerator:
  - name: app-config
    literals:
      - APP_ENV=base
      - APP_GREETING=Hello from Argo CD

images:
  - name: ghcr.io/gsaini/argocd-getting-started
    newTag: latest
